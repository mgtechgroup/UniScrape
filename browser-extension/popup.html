<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><style>
body{width:380px;padding:12px;background:#0a0a0f;color:#e0e0e0;font-family:-apple-system,BlinkMacSystemFont,sans-serif}
input{width:100%;padding:10px;background:#151520;border:1px solid #2a2a3a;border-radius:8px;color:#e0e0e0;font-size:14px;margin-bottom:8px}
button{width:100%;padding:10px;background:#8B5CF6;border:none;border-radius:8px;color:#fff;font-weight:600;cursor:pointer}
#results{margin-top:8px;max-height:400px;overflow-y:auto}
.item{padding:8px;border-bottom:1px solid #2a2a3a;font-size:12px}
.item a{color:#8B5CF6}
.item .src{color:#888;font-size:11px}
</style></head>
<body>
<h2 style="background:linear-gradient(135deg,#8B5CF6,#EC4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent">UniScrape Search</h2>
<input id="q" placeholder="Search scenes, torrents, streams...">
<button onclick="search()">Search</button>
<div id="results"></div>
<script>
const API='http://localhost:8085/api/v1/manager/search/all';
async function search(){
    const q=document.getElementById('q').value.trim();
    if(!q)return;
    document.getElementById('results').innerHTML='Searching...';
    try{
        const r=await fetch(`${API}?q=${encodeURIComponent(q)}`);
        const d=await r.json();
        document.getElementById('results').innerHTML=d.results.map(r=>`<div class="item"><a href="${r.url||'#'}" target="_blank">${r.title}</a><div class="src">${r.source} | ${r.type}</div></div>`).join('');
    }catch(e){document.getElementById('results').innerHTML='Error: Is UniScrape server running?';}
}
</script></body></html>
